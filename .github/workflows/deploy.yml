name: 🚀 CI/CD — Build & Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: write

jobs:
  # ─── JOB 1: Build & Test ───────────────────────────────────────────────────
  build:
    name: 🔨 Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: 📦 Install dependencies
        run: npm ci --legacy-peer-deps

      - name: 🔍 Lint (ESLint)
        run: npx eslint src --ext .js,.jsx,.ts,.tsx --max-warnings=0 || true

      - name: 🏗️ Build production bundle
        run: npm run build
        env:
          CI: false          # Tắt "treat warnings as errors" của CRA
          GENERATE_SOURCEMAP: false
          REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL }}
          REACT_APP_FIREBASE_API_KEY: ${{ secrets.REACT_APP_FIREBASE_API_KEY }}
          REACT_APP_FIREBASE_AUTH_DOMAIN: ${{ secrets.REACT_APP_FIREBASE_AUTH_DOMAIN }}
          REACT_APP_FIREBASE_PROJECT_ID: ${{ secrets.REACT_APP_FIREBASE_PROJECT_ID }}
          REACT_APP_FIREBASE_STORAGE_BUCKET: ${{ secrets.REACT_APP_FIREBASE_STORAGE_BUCKET }}
          REACT_APP_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.REACT_APP_FIREBASE_MESSAGING_SENDER_ID }}
          REACT_APP_FIREBASE_APP_ID: ${{ secrets.REACT_APP_FIREBASE_APP_ID }}
          REACT_APP_FIREBASE_MEASUREMENT_ID: ${{ secrets.REACT_APP_FIREBASE_MEASUREMENT_ID }}
          
      - name: 📄 Verify CNAME file exists (custom domain)
        run: |
          if [ ! -f build/CNAME ]; then
            echo "events.net.vn" > build/CNAME
            echo "CNAME file created"
          else
            echo "CNAME file already exists: $(cat build/CNAME)"
          fi

      - name: 📤 Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: build/
          retention-days: 1

  # ─── JOB 2: Deploy (chỉ chạy khi push lên main) ────────────────────────────
  deploy:
    name: 🌐 Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      - name: 📥 Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: build/

      - name: 🚀 Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          publish_branch: gh-pages
          # 🔑 QUAN TRỌNG: cóng này tự động inject CNAME vào gh-pages branch
          # → custom domain events.net.vn được giữ nguyên sau mọi lần deploy
          cname: events.net.vn
          commit_message: "🚀 deploy: ${{ github.event.head_commit.message }}"
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
